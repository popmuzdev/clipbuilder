name: Auto Video Render

on:
  workflow_dispatch:

jobs:
  build-and-render:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install FFmpeg and Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg
        pip install moviepy

    - name: Run Video Generator
      run: |
        python generate_video.py

    - name: Upload Finished Video
      uses: actions/upload-artifact@v4
      with:
        name: Finished-Music-Video
        path: output.mp4
        retention-days: 1
